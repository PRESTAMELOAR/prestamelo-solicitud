services:
  - type: web
    name: prestamelo-admin
    runtime: node
    plan: starter
    buildCommand: ""
    startCommand: node server.js
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
